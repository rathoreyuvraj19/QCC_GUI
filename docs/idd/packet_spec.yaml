# =============================================================================
# packet_spec.yaml
#
# SINGLE SOURCE OF TRUTH for the QCC / 96x QTRM Ethernet UDP frame.
#
# Everything else (PySide6 GUI struct packing, HPS C register/packet defs,
# VHDL address decode constants, and the IDD Word doc tables) should be
# generated FROM this file, not hand-typed separately. If a field changes,
# it changes here first, then regenerate the downstream artifacts.
#
# Byte order: little-endian, system-wide.
# Total frame size: 2970 bytes = 90 (header) + 2880 (QTRM data block).
#
# Command model (redesigned 2026-07-09, replaces the earlier mode-based
# COMMAND_ID scheme):
#   - byte 5 (1-indexed) is now an opaque ECHO_BYTE - RC may send any
#     value, QCC no longer interprets it and echoes it back unchanged.
#   - byte 33 (1-indexed) is now QCC_COMMAND - a flat 9-value enum that
#     selects which of 9 commands to execute. RC sets it in the TX packet;
#     QCC echoes the same value back at byte 33 of its Response.
#   - The RESPONSE packet (QCC -> RC) is ALWAYS the same structure,
#     regardless of which command triggered it.
#   - The TX packet (RC -> QCC, i.e. the command) DOES vary by
#     QCC_COMMAND. Bytes 1-32 are identical across every TX variant; only
#     the Message Body (bytes 34-89) differs per command.
#
# Status values per field:
#   defined  - locked in, safe to generate code/docs from
#   tbd      - placeholder only, do not generate downstream code for this yet
# =============================================================================

frame:
  name: qcc_frame
  total_size_bytes: 2970
  byte_order: little_endian
  sections:
    - { name: header,          size_bytes: 90 }
    - { name: qtrm_data_block, size_bytes: 2880 }

# -----------------------------------------------------------------------------
# Combined 90-byte header - shared structure for both directions (bytes 1-33
# and byte 90 are identical fields in both RESPONSE and TX packets; only the
# Message Body content at bytes 34-89 differs).
# One CRC-8 checksum at the very end covers the whole header.
# -----------------------------------------------------------------------------

header:
  name: qcc_header
  size_bytes: 90
  checksum:
    algorithm: crc8_ccitt
    polynomial: 0x07
    init: 0x00
    reflect_in: false
    reflect_out: false
    xor_out: 0x00
    check_value: { input: "123456789", expect: 0xF4 }
    covers: { start_byte: 1, end_byte: 89 }   # 1-indexed, inclusive
    stored_at_byte: 90

  fields:
    - { byte: 1,       name: destination_id,   size: 1,  type: u8,       status: defined, desc: "RC fills this in the TX packet. QCC swaps it into source_id when building the Response." }
    - { byte: 2,       name: source_id,        size: 1,  type: u8,       status: defined, desc: "RC fills this in the TX packet. QCC swaps it into destination_id when building the Response." }
    - { byte: [3,4],   name: packet_size,      size: 2,  type: u16,      status: defined, desc: "Always 2970 (90-byte header + 2880-byte QTRM data block) - same fixed value in both directions." }
    - { byte: 5,       name: echo_byte,        size: 1,  type: u8,       status: defined, desc: "RC may send any value; QCC no longer interprets this byte and echoes it back unchanged in the Response (byte 5)." }
    - { byte: 6,       name: command_ack,      size: 1,  type: u8,       status: defined, desc: "RC fills 0x00 (command). QCC fills 0x01 (acknowledgement/response) in the Response.", values: { 0: command_from_rc, 1: response_from_qcc } }
    - { byte: [7,10],  name: message_number,   size: 4,  type: u32,      status: defined, desc: "Counter incremented by RC per message sent. QCC echoes the same value back in its Response so RC can match request to response." }
    - { byte: 11,      name: date,             size: 1,  type: u8,       status: defined, desc: "Day of month, decimal (not hex). Filled by RC; QCC copies unchanged into Response.", range: [1, 31] }
    - { byte: 12,      name: month,            size: 1,  type: u8,       status: defined, desc: "Month, decimal (not hex). Filled by RC; QCC copies unchanged into Response.", range: [1, 12] }
    - { byte: [13,14], name: year,             size: 2,  type: u16,      status: defined, desc: "Calendar year, decimal (not hex). Lower/Higher byte combine per byte order. Filled by RC; QCC copies unchanged into Response." }
    - { byte: [15,18], name: time_of_day,      size: 4,  type: u32,      status: tbd,     desc: "Filled by RC; QCC copies exactly into Response, unchanged. Exact format/units (ms-since-midnight vs packed HHMMSS) still TBD." }
    - { byte: [19,22], name: qcc_query_count,  size: 4,  type: u32,      status: defined, desc: "RESPONSE only: count of messages received by QCC (queries). TX: reserved, RC fills with 0x00." }
    - { byte: [23,26], name: qcc_response_count, size: 4, type: u32,     status: defined, desc: "RESPONSE only: count of messages QCC has responded to. TX: reserved, RC fills with 0x00." }
    - { byte: 27,      name: qcc_firmware_no,  size: 1,  type: u8,       status: defined, desc: "RESPONSE only: QCC firmware version/build number. TX: reserved, RC fills with 0x00." }
    - { byte: [28,31], name: reserved_a,       size: 4,  type: "u8[4]",  status: defined, desc: "Reserved" }
    - { byte: 32,      name: reserved_b,       size: 1,  type: u8,       status: defined, desc: "Reserved (previously a standalone XOR checksum - removed; single CRC-8 at byte 90 covers the whole header now)" }
    - { byte: 33,      name: qcc_command,      size: 1,  type: u8,       status: defined, desc: "TX: RC selects the command to execute (see qcc_commands below). RESPONSE: QCC echoes back the qcc_command value from the command that produced this response.", enum_ref: qcc_commands }
    - { byte: [34,89], name: message_body,     size: 56, type: "u8[56]", status: mixed,   desc: "RESPONSE direction: fully defined, see message_body_response below. TX direction: varies per qcc_command, see message_body_tx below." }
    - { byte: 90,      name: checksum,         size: 1,  type: u8,       status: defined, desc: "CRC-8/CCITT over bytes 1-89" }

# -----------------------------------------------------------------------------
# QCC_COMMAND enum (byte 33) - flat command selector, redesigned 2026-07-09
# to replace the earlier mode-based COMMAND_ID scheme. Only
# DATA_DISTRIBUTION triggers a DMA write (mSGDMA) of the 2880-byte QTRM
# data block on the HPS side - no other command does.
# qtrm_data_block_state describes whether the 2880-byte QTRM data block is
# populated or left empty in the Response for that command.
# -----------------------------------------------------------------------------

qcc_commands:
  - { value: 0x00, name: DATA_DISTRIBUTION,   status: defined, desc: "Triggers a DMA write (mSGDMA); QCC responds with the full 90-byte Response header plus the full, populated 2880-byte QTRM data block.", triggers_dma_write: true,  qtrm_data_block_state: populated }
  - { value: 0x01, name: QCC_STATUS,          status: defined, desc: "No DMA triggered; QCC responds with current telemetry in the 90-byte Response header only.", triggers_dma_write: false, qtrm_data_block_state: empty }
  - { value: 0x02, name: QCC_RESET,           status: defined, desc: "No DMA triggered; resets FPGA-side buffers, counters, and internal state via a PIO pin.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0x03, name: PRT_BYPASS,          status: defined, desc: "No DMA triggered; PRT generator is bypassed using the externally-supplied parameters in message_body.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0x04, name: SOB_BYPASS,          status: defined, desc: "No DMA triggered; SOB generator is bypassed using the externally-supplied width in message_body.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0x05, name: PRT_INTERNAL_GEN,    status: defined, desc: "No DMA triggered; configures the PRT internal generator using the parameters in message_body.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0x06, name: SOB_INTERNAL_GEN,    status: defined, desc: "No DMA triggered; configures the SOB internal generator using the width in message_body.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0x07, name: PPS_INTERNAL_GEN,    status: defined, desc: "No DMA triggered; configures the PPS internal generator using the width in message_body.", triggers_dma_write: false, qtrm_data_block_state: tbd }
  - { value: 0xFF, name: REMOTE_PROGRAMMING,  status: defined, desc: "No DMA triggered. Selects a Remote Programming session; byte 34 (message_body offset 0) is a SubCommand selector - see remote_programming_subcommands below. CONFIRMED 2026-07-18 per Yuvraj. Does NOT use the standard 56-byte message_body frame shape - see remote_programming_framing below.", triggers_dma_write: false, qtrm_data_block_state: tbd }

# -----------------------------------------------------------------------------
# Message Body (bytes 34-89, 56 bytes) - TX direction (RC -> QCC command).
# Varies per qcc_command. DATA_DISTRIBUTION, QCC_STATUS, QCC_RESET, and
# REMOTE_PROGRAMMING (for now) need no command data at all (the qcc_command
# value itself is the whole command). PRT_BYPASS/PRT_INTERNAL_GEN share the
# same body shape (a PRT command's fields); SOB_BYPASS/SOB_INTERNAL_GEN
# share the same body shape (an SOB command's fields) - Bypass vs Internal
# Gen is which qcc_command value is used, not a field inside the body.
# PPS_INTERNAL_GEN has its own body shape; there is no PPS_BYPASS command.
# -----------------------------------------------------------------------------

message_body_tx:
  size_bytes: 56
  per_command:
    DATA_DISTRIBUTION:
      status: defined
      fields: []
      note: "No command data needed - triggers a DMA write (mSGDMA); QCC responds with the full 90-byte header + fully populated 2880-byte QTRM data block."
    QCC_STATUS:
      status: defined
      fields: []
      note: "No command data needed - no DMA triggered; QCC responds with current telemetry in the 90-byte header only."
    QCC_RESET:
      status: defined
      fields: []
      note: "No command data needed - no DMA triggered; resets FPGA-side buffers, counters, and internal state via a PIO pin."
    PRT_BYPASS:
      status: defined
      fields:
        - { offset: [0,3],  name: prt_count,    size: 4, type: u32, desc: "Number of PRTs to generate. 0xFFFFFFFF = generate infinite PRTs." }
        - { offset: [4,7],  name: pri_width_us, size: 4, type: u32, desc: "Pulse Repetition Interval, microseconds." }
        - { offset: [8,9],  name: prt_width_us, size: 2, type: u16, desc: "PRT pulse width, microseconds." }
        - { offset: [10,55], name: reserved,    size: 46, type: "u8[46]", desc: "Unused in this command" }
      note: "No DMA triggered; PRT generator is bypassed using these externally-supplied parameters."
    SOB_BYPASS:
      status: defined
      fields:
        - { offset: [0,1],  name: sob_width, size: 2, type: u16, desc: "SOB pulse width" }
        - { offset: [2,55], name: reserved,  size: 54, type: "u8[54]", desc: "Unused in this command" }
      note: "No DMA triggered; SOB generator is bypassed using this externally-supplied width."
    PRT_INTERNAL_GEN:
      status: defined
      fields:
        - { offset: [0,3],  name: prt_count,    size: 4, type: u32, desc: "Number of PRTs to generate. 0xFFFFFFFF = generate infinite PRTs." }
        - { offset: [4,7],  name: pri_width_us, size: 4, type: u32, desc: "Pulse Repetition Interval, microseconds." }
        - { offset: [8,9],  name: prt_width_us, size: 2, type: u16, desc: "PRT pulse width, microseconds." }
        - { offset: [10,55], name: reserved,    size: 46, type: "u8[46]", desc: "Unused in this command" }
      note: "No DMA triggered; configures the PRT internal generator using these parameters."
    SOB_INTERNAL_GEN:
      status: defined
      fields:
        - { offset: [0,1],  name: sob_width, size: 2, type: u16, desc: "SOB pulse width" }
        - { offset: [2,55], name: reserved,  size: 54, type: "u8[54]", desc: "Unused in this command" }
      note: "No DMA triggered; configures the SOB internal generator using this width."
    PPS_INTERNAL_GEN:
      status: defined
      fields:
        - { offset: [0,1],  name: pps_width, size: 2, type: u16, desc: "PPS pulse width" }
        - { offset: [2,55], name: reserved,  size: 54, type: "u8[54]", desc: "Unused in this command" }
      note: "No DMA triggered; configures the PPS internal generator using this width."
    REMOTE_PROGRAMMING:
      status: defined
      fields:
        - { offset: 0, name: sub_command, size: 1, type: u8, desc: "SubCommand selector for the Remote Programming session - see remote_programming_subcommands below.", enum_ref: remote_programming_subcommands }
      note: "CONFIRMED 2026-07-18 per Yuvraj. sub_command occupies only byte 34 (message_body offset 0) - REMOTE_PROGRAMMING frames do NOT use the rest of the standard 56-byte message_body shape this table otherwise describes; see remote_programming_framing below for the actual on-wire frame shapes, which vary by sub_command."

# -----------------------------------------------------------------------------
# REMOTE_PROGRAMMING SubCommand enum (byte 34 / message_body offset 0) -
# CONFIRMED 2026-07-18 per Yuvraj. QCC itself reads this byte and acts on it
# directly (it is not forwarded to the QTRMs).
# -----------------------------------------------------------------------------

remote_programming_subcommands:
  - { value: 0x00, name: BROADCAST,     status: defined, desc: "QCC reads this and forwards the following 10 (or 10+4096) bytes verbatim to all 96 QTRMs over the shared low-speed FIFO/UART. The standard path for every QTRM-targeted RP command: Link Check, Get LRU Info, Authenticate/Verify/Program, Bitstream Receive announce, Bitstream DATA chunks, and the QTRM -> High Speed broadcast (bootloader command_type 0x32, CT_MODE_CHANGE_MSS_TO_FAB) added 2026-07-18." }
  - { value: 0x01, name: QCC_LOW_SPEED,  status: defined, desc: "QCC switches its own UART to the low-speed 115200 bootloader link (Mode Step 2). Bare 90-byte header only - no inner command, no payload." }
  - { value: 0x02, name: QCC_HIGH_SPEED, status: defined, desc: "QCC switches its own UART back to high speed (QCC -> High Speed / Mode Back). Bare 90-byte header only - no inner command, no payload. VALUE CHANGED 2026-07-18 from 0x00 to 0x02 so 0x00 is reserved exclusively for BROADCAST." }

# -----------------------------------------------------------------------------
# Remote Programming on-wire frame shapes - these are NOT the standard
# [90-byte header][56-byte message_body] shape; total frame size varies by
# sub_command. See core/packet.py's RP_* size constants and CLAUDE.md open
# issue 5 for full detail.
# -----------------------------------------------------------------------------

remote_programming_framing:
  - { sub_command: [QCC_LOW_SPEED, QCC_HIGH_SPEED], total_size_bytes: 90, shape: "[90-byte header]", desc: "QCC's own self-directed UART switch - no inner command, no payload." }
  - { sub_command: BROADCAST, total_size_bytes: 100, shape: "[90-byte header][10-byte inner bootloader command]", desc: "Every QTRM-targeted RP command except bitstream DATA chunks." }
  - { sub_command: BROADCAST, total_size_bytes: 4196, shape: "[90-byte header][10-byte inner bootloader command][4096-byte payload]", desc: "Bitstream DATA chunks only (CT_BITSTREAM_DATA, 0x34)." }
  - { sub_command: BROADCAST, total_size_bytes: 2970, shape: "[90-byte header][96 x 30-byte QTRM slots]", desc: "Mode Step 1 only (QTRMs -> Low-Speed) - QTRMs are still per-QTRM-addressed at this point, not yet on the shared low-speed FIFO, so the 10-byte command is replicated into every slot." }

# -----------------------------------------------------------------------------
# Message Body (bytes 34-89, 56 bytes) - RESPONSE direction (QCC -> RC).
# Fixed format, ALWAYS the same regardless of which command triggered it -
# only the qtrm_data_block content varies by command (see qcc_commands above).
# Offsets below are relative to the start of message_body (add 34 for
# absolute byte position in the full 90-byte header).
# -----------------------------------------------------------------------------

message_body_response:
  size_bytes: 56
  status: defined
  fields:
    - { offset: [0,1],   name: fpga_temperature,      size: 2, type: "s10.0 (2's complement)", desc: "FPGA die temperature. 10 usable bits, 2's complement signed value in bits 0-9; bits 10-15 = 0 (fixed)." }
    - { offset: [2,3],   name: board_temperature,     size: 2, type: u16, desc: "Board temperature sensor reading, 16-bit." }
    - { offset: [4,5],   name: board_humidity,        size: 2, type: u16, desc: "Board humidity sensor reading, 16-bit." }
    - { offset: [6,9],   name: input_sob_count,       size: 4, type: u32, desc: "SOB count measured on input" }
    - { offset: [10,13], name: input_prt_count,       size: 4, type: u32, desc: "PRT count measured on input" }
    - { offset: [14,17], name: input_pps_count,       size: 4, type: u32, desc: "PPS count measured on input" }
    - { offset: [18,21], name: output_prt_count,      size: 4, type: u32, desc: "PRT count measured on output" }
    - { offset: [22,25], name: output_sob_count,      size: 4, type: u32, desc: "SOB count measured on output" }
    - { offset: [26,27], name: input_sob_width_us,    size: 2, type: u16, desc: "Last SOB pulse width measured on input, microseconds" }
    - { offset: [28,29], name: output_sob_width_us,   size: 2, type: u16, desc: "Last SOB pulse width measured on output, microseconds" }
    - { offset: [30,31], name: input_prt_width_us,    size: 2, type: u16, desc: "Last PRT pulse width measured on input, microseconds" }
    - { offset: [32,33], name: output_prt_width_us,   size: 2, type: u16, desc: "Last PRT pulse width measured on output, microseconds" }
    - { offset: [34,37], name: input_prt_pri,         size: 4, type: u32, desc: "PRT PRI (Pulse Repetition Interval) measured on input, microseconds" }
    - { offset: [38,41], name: output_prt_pri,        size: 4, type: u32, desc: "PRT PRI (Pulse Repetition Interval) measured on output, microseconds" }
    - { offset: [42,43], name: input_pps_width_us,    size: 2, type: u16, desc: "Last PPS pulse width measured on input, microseconds" }
    - { offset: [44,47], name: pps_counter,           size: 4, type: u32, desc: "Separate 32-bit PPS counter (distinct from input_pps_count)" }
    - { offset: 48,      name: generator_status,      size: 1, type: u8, status: defined, desc: "Generator/mode status. Bit 0: SOB_STATE (0=bypass, 1=internal). Bit 1: PRT_STATE (0=bypass, 1=internal). Bit 2: QCC_MODE / speed toggle status (0=normal high-speed mode, 1=low-speed remote-programming mode) - added 2026-07-18 per Yuvraj. Bits 7-3: reserved (0x00).", enum_ref: generator_status_bits }
    - { offset: [49,51], name: reserved,              size: 3, type: "u8[3]", desc: "Reserved" }
    - { offset: [52,55], name: chip_id,               size: 4, type: u32, desc: "Lower 32 bits of the 64-bit chip ID, positioned immediately before the Checksum" }

# -----------------------------------------------------------------------------
# generator_status (message_body_response offset 48 / absolute byte 82)
# individual bit reference - see the field's desc above for the packed byte.
# -----------------------------------------------------------------------------

generator_status_bits:
  - { bit: 0, name: SOB_STATE,  status: defined, desc: "0=bypass, 1=internal" }
  - { bit: 1, name: PRT_STATE,  status: defined, desc: "0=bypass, 1=internal" }
  - { bit: 2, name: QCC_MODE,   status: defined, desc: "Speed toggle status - 0=normal high-speed mode, 1=low-speed remote-programming mode. Added 2026-07-18 per Yuvraj." }

# -----------------------------------------------------------------------------
# QTRM data block: 96 fixed 30-byte slots, positional QTRM ID (not a field
# inside the bytes). Sourced from packet.py (QTRMSlot / QTRMChannel / CMD_*).
# Whether this block is populated or empty in a given Response depends on
# the command - see qcc_commands[].qtrm_data_block_state above.
# -----------------------------------------------------------------------------

qtrm_data_block:
  size_bytes: 2880
  num_slots: 96
  slot_size_bytes: 30
  qtrm_id: positional   # slot index (1..96), not an explicit field

qtrm_slot:
  name: qtrm_slot
  size_bytes: 30
  checksum:
    algorithm: xor
    covers: { start_byte: 0, end_byte: 28 }   # 0-indexed within the slot
    stored_at_byte: 29
    owner: gui_or_qtrm   # generated/verified by GUI/QTRM side, NOT by QCC
  fields:
    - { byte: 0,     name: header,          size: 1, type: u8, status: defined, desc: "Fixed value 0xAA" }
    - { byte: 1,     name: packet_size_id,  size: 1, type: u8, status: defined, desc: "0x04 for QTRM (4 channels)" }
    - { byte: 2,     name: command_type,    size: 1, type: u8, status: defined, desc: "See qtrm_command_types below", enum_ref: qtrm_command_types }
    - { byte: 3,     name: status_byte,     size: 1, type: u8, status: defined, desc: "ACK_TYPE (bits 7-4) / ACK_ON_OFF (bits 3-0)" }
    - { byte: 4,     name: dwell_id,        size: 1, type: u8, status: defined, desc: "Dwell / MSG ID" }
    - { byte: 5,     name: frequency_id,    size: 1, type: u8, status: defined, desc: "Frequency ID" }
    - { byte: [6,8], name: reserved,        size: 3, type: "u8[3]", status: defined, desc: "Reserved" }
    - { byte: [9,13],  name: channel_1, size: 5, type: qtrm_channel, status: defined, desc: "Channel 1" }
    - { byte: [14,18], name: channel_2, size: 5, type: qtrm_channel, status: defined, desc: "Channel 2" }
    - { byte: [19,23], name: channel_3, size: 5, type: qtrm_channel, status: defined, desc: "Channel 3" }
    - { byte: [24,28], name: channel_4, size: 5, type: qtrm_channel, status: defined, desc: "Channel 4" }
    - { byte: 29,    name: xor_checksum, size: 1, type: u8, status: defined, desc: "XOR of bytes 0-28" }

qtrm_channel:
  size_bytes: 5
  fields:
    - { offset: 0, name: control,   size: 1, type: u8, desc: "Control byte" }
    - { offset: 1, name: tx_phase,  size: 1, type: u8, desc: "Tx phase" }
    - { offset: 2, name: tx_atten,  size: 1, type: u8, desc: "Tx attenuation" }
    - { offset: 3, name: rx_phase,  size: 1, type: u8, desc: "Rx phase" }
    - { offset: 4, name: rx_atten,  size: 1, type: u8, desc: "Rx attenuation" }

qtrm_command_types:
  - { value: 0x00, name: CMD_RESERVED,          desc: "Reserved" }
  - { value: 0x01, name: CMD_DWELL,             desc: "Dwell" }
  - { value: 0x02, name: CMD_RX_CAL,            desc: "Rx Calibration" }
  - { value: 0x03, name: CMD_TX_CAL,            desc: "Tx Calibration" }
  - { value: 0x04, name: CMD_RX_ISOLATION,      desc: "Rx Isolation" }
  - { value: 0x05, name: CMD_TX_ISOLATION,      desc: "Tx Isolation" }
  - { value: 0x06, name: CMD_RX_PATTERN,        desc: "Rx Pattern" }
  - { value: 0x07, name: CMD_TX_PATTERN,        desc: "Tx Pattern" }
  - { value: 0x20, name: CMD_SOFT_RESET,        desc: "Soft Reset" }
  - { value: 0x21, name: CMD_STATUS,            desc: "Status" }
  - { value: 0x22, name: CMD_DATA_STORAGE,      desc: "Data Storage" }
  - { value: 0x23, name: CMD_DC_CONTROL,        desc: "DC Control" }
  - { value: 0x40, name: CMD_TIMING_SIGNAL_GEN, desc: "Timing Signal Generation" }

# -----------------------------------------------------------------------------
# Open items - carried over verbatim so codegen/doc tools can flag them
# rather than silently assuming an answer.
# -----------------------------------------------------------------------------

open_items:
  - "What format is time_of_day (header bytes 15-18)?"
  - "RESOLVED 2026-07-18: REMOTE_PROGRAMMING command (0xFF) byte 34 is a SubCommand selector (0x00 Broadcast/0x01 QCC Low-Speed/0x02 QCC High-Speed - see remote_programming_subcommands), and the frame does use a different, variable-length shape than the standard 56-byte message_body - see remote_programming_framing."
  - "PRT_BYPASS/PRT_INTERNAL_GEN's prt_width_us and SOB_BYPASS/SOB_INTERNAL_GEN/PPS_INTERNAL_GEN's width field sizes/units are drafted and approved, but not yet cross-checked against the actual sob_gen/prt_gen VHDL register widths (e.g. sob_gen's i_sob_width port is 8-bit in the current RTL, vs 16-bit specified here - needs reconciliation before implementation)."
  - "qtrm_data_block_state is only confirmed for DATA_DISTRIBUTION (populated) and QCC_STATUS (empty) - QCC_RESET, PRT_BYPASS, SOB_BYPASS, PRT_INTERNAL_GEN, SOB_INTERNAL_GEN, PPS_INTERNAL_GEN, REMOTE_PROGRAMMING are still TBD."
  - "Which GUI command tabs should send which QCC_COMMAND value is a code-level judgment call, not stated directly in the IDD - Dwell/Link Test/Status/RX Cal/TX Cal/Isolation/Soft Reset/Memory Operation are currently all mapped to DATA_DISTRIBUTION (0x00) in core/rc_settings.py on the reasoning that they all deliver a QTRM-targeted command via the DMA'd 2880-byte data block; Soft Reset and Memory Operation previously used QCC_RESET(4)/REMOTE_PROGRAMMING(5) under the old mode scheme, which don't have a clean equivalent anymore. Confirm with Yuvraj."
  - "PPS has no Bypass counterpart in the new QCC_COMMAND enum (only PPS_INTERNAL_GEN exists) - the old spec's 'PPS is External Loopback only' framing doesn't carry over cleanly. main_window.py's Timing tab currently sends PPS_INTERNAL_GEN unconditionally; confirm this is intended rather than an omitted PPS_BYPASS command."
